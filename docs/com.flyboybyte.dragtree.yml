Builds:
  - versionName: 1.7.1
    versionCode: 13
    commit: 2b9bf0115a33702999af22993a24d4b0017eddd9
    subdir: artifacts/drag-tree/android/app
    sudo:
      - apt-get update
      - apt-get install -y npm default-jdk
      - npm install -g pnpm
    init:
      - cd ../../../..
      - pnpm install --no-frozen-lockfile --ignore-scripts
    gradle:
      - yes
    prebuild:
      - cd ../..
      - sed -i -e '1a "expo":{"autolinking":{"android":{"buildFromSource":[".*"]}}},'
        package.json
      - sed -i '/jvmToolchain\|JavaVersion/s/17/21/' node_modules/@react-native/gradle-plugin/*/build.gradle.kts
        node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/src/main/kotlin/com/facebook/react/utils/JdkConfiguratorUtils.kt
      - sed -i -e '/installreferrer/d' node_modules/expo-application/android/build.gradle
      - sed -i -e '/com.android.installreferrer.api/d' -e '/StringBuilder()/,/^      })/d'
        -e '/getInstallReferrerAsync/apromise.resolve("")'
        node_modules/expo-application/android/src/main/java/expo/modules/application/ApplicationModule.kt
      - npx expo prebuild -p android --clean
      - sed -i -e '/signingConfig /d' android/app/build.gradle
    scanignore:
      - artifacts/drag-tree/node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
      - artifacts/drag-tree/node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle
      - artifacts/drag-tree/node_modules/expo-modules-autolinking/scripts/android/autolinking_implementation.gradle
    scandelete:
      - artifacts/drag-tree/node_modules
    ndk: 27.1.12297006

