AutoName: DragTree
Description: |-
  Simulates a real NHRA Pro Tree (all 3 ambers fire simultaneously, green
  0.400 s later) and measures your reaction time using the phone's
  accelerometer. Mount your phone on the dash, stage up, watch the tree,
  and floor it — the app detects launch G-force and records your RT
  automatically. No tapping required when the sensor is enabled.

  Features Pro Tree and Sportsman Tree modes, three sensitivity presets,
  reaction grading, run history, trend chart, optional audio cues, and
  series mode for back-to-back runs. Fully offline — no internet required.

  Permissions note: HIGH_SAMPLING_RATE_SENSORS is required for 125 Hz
  accelerometer sampling. Other permissions (INTERNET, VIBRATE, etc.) are
  included by Expo's Android template and React Native defaults; none are
  exercised at runtime by the app itself.

RepoType: git
Repo: https://github.com/flyboy-byte/drag-tree

Builds:
  - versionName: 1.7.1
    versionCode: 13
    commit: v1.7.1
    subdir: artifacts/drag-tree/android
    sudo:
      - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
      - mkdir -p /etc/apt/keyrings
      - curl -fsSLO https://packages.adoptium.net/artifactory/api/gpg/key/public
      - gpg --dearmor < public > /etc/apt/keyrings/adoptium.gpg
      - echo 'deb [signed-by=/etc/apt/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb
        trixie main' >> /etc/apt/sources.list
      - apt-get update
      - apt-get install -y nodejs temurin-17-jdk
      - npm install -g pnpm
    init: cd ../../.. && pnpm install --no-frozen-lockfile --ignore-scripts
    gradle:
      - yes
    output: app/build/outputs/apk/release/app-release-unsigned.apk
    scanignore:
      - node_modules
    ndk: 27.1.12297006

AutoUpdateMode: Version
UpdateCheckMode: Tags
