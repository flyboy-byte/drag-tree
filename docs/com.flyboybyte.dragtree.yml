AutoName: DragTree
Description: |-
  Simulates a real NHRA Pro Tree (all 3 ambers fire simultaneously, green
  0.400 s later) and measures your reaction time using the phone's
  accelerometer. Mount your phone on the dash, stage up, watch the tree,
  and floor it — the app detects launch G-force and records your RT
  automatically. No tapping required when the sensor is enabled.

  Features Pro Tree and Sportsman Tree modes, three sensitivity presets,
  reaction grading, run history, trend chart, optional audio cues, and
  series mode for back-to-back runs. Fully offline — no internet required.

  Permissions note: HIGH_SAMPLING_RATE_SENSORS is required for 125 Hz
  accelerometer sampling. Other permissions (INTERNET, VIBRATE, etc.) are
  included by Expo's Android template and React Native defaults; none are
  exercised at runtime by the app itself.

RepoType: git
