    subdir: artifacts/drag-tree/android/app
    sudo:
      - apt-get update
      - apt-get install npm
      - npm -g install pnpm@10
    init:
      - cd ../../../..
      - pnpm install --config.node-linker=hoisted --no-frozen-lockfile --ignore-scripts
    gradle:
      - yes
    prebuild:
      - cd ../../../..
      - sed -i -e '1a "expo":{"autolinking":{"android":{"buildFromSource":[".*"]}}},'
