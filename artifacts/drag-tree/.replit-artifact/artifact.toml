kind = "mobile"
previewPath = "/"
title = "Drag Strip Tree"
version = "1.0.0"
id = "artifacts/drag-tree"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24335

[services.development]
run = "pnpm --filter @workspace/drag-tree run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/drag-tree", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/drag-tree", "run", "serve" ]

[services.env]
PORT = "24335"
BASE_PATH = "/"
